<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliQuiz - Espace Social</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151d30;
            --accent-cyan: #00f0ff;
            --accent-gold: #ffb800;
            --text-light: #ffffff;
            --text-muted: #8fa0bc;
            --success: #00e676;
            --error: #ff3d00;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            overflow-x: hidden;
        }

        .social-layout {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background-color: var(--bg-card);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .menu-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-items li {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-items li:hover, .menu-items li.active {
            background: rgba(0, 240, 255, 0.05);
            border-left-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
        }

        .top-navbar {
            height: 60px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn-toggle {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: none;
        }

        .view-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .tab-view {
            display: none;
        }

        .tab-view.active {
            display: block;
        }

        /* SCROLLERS & ITEMS */
        .list-scroller {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .user-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .user-item:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.04);
        }

        .user-info-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-mini {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .user-info-mini h4 {
            margin: 0;
            font-size: 14px;
        }

        .user-info-mini p {
            margin: 3px 0 0 0;
            font-size: 12px;
        }

        /* CHAT CONTAINER BOX */
        .chat-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            z-index: 5;
            display: none;
            flex-direction: column;
        }

        .chat-container.view-chat {
            display: flex;
        }

        .chat-header-info {
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-container {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        .msg-container.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-container.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .sent .msg {
            background: var(--accent-cyan);
            color: #000;
            border-top-right-radius: 2px;
        }

        .received .msg {
            background: var(--bg-card);
            color: #fff;
            border-top-left-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .msg-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-input-row {
            padding: 15px 20px;
            background: var(--bg-card);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 10px;
        }

        .chat-input-row input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
        }

        /* UTILS */
        .btn-action {
            background: var(--accent-cyan);
            color: black;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .search-bar-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-bar-row input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 10px;
            color: white;
            outline: none;
        }

        .status-dot-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #555;
            margin-right: 5px;
        }

        .status-dot-indicator.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .alert-msg {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .alert-msg.success { background: rgba(0, 230, 118, 0.15); color: var(--success); border: 1px solid var(--success); }
        .alert-msg.error { background: rgba(255, 61, 0, 0.15); color: var(--error); border: 1px solid var(--error); }

        .btn-back {
            background: none;
            border: none;
            color: var(--accent-cyan);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-back svg {
            width: 18px;
            height: 18px;
            fill: var(--accent-cyan);
        }

        .tick-svg {
            width: 14px;
            height: 14px;
            fill: var(--text-muted);
        }

        .tick-svg.delivered { fill: var(--text-muted); }
        .tick-svg.read { fill: var(--accent-cyan); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .btn-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="social-layout">
        
        <!-- SIDEBAR DE GAUCHE -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 style="color:var(--accent-cyan); font-size:18px; margin:0;">AliQuiz Social</h2>
            </div>
            <ul class="menu-items">
                <li class="active" onclick="switchSubTab('amisTab', this)">
                    <span>Mes Amis</span>
                </li>
                <li onclick="switchSubTab('rechercheTab', this)">
                    <span>Rechercher</span>
                </li>
                <li onclick="switchSubTab('demandeAmieTab', this)">
                    <span>Demandes d'Ami</span>
                </li>
                <li onclick="switchSubTab('bloqueTab', this)">
                    <span>Joueurs Bloqués</span>
                </li>
            </ul>
        </div>

        <!-- ZONE DE DROITE (CONTENU PRINCIPAL) -->
        <div class="main-content" id="mainContent">
            
            <div class="top-navbar">
                <button class="btn-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
            </div>

            <div class="view-body">
                
                <!-- TAB 1: LISTE DES AMIS & SUGGESTIONS -->
                <div class="tab-view active" id="amisTab">
                    <h3 style="color:var(--accent-gold); font-size:16px; margin:0 0 10px 0;">Mes Amis</h3>
                    <div class="list-scroller" id="friendsScroller"></div>

                    <h3 style="color:var(--accent-gold); font-size:16px; margin:25px 0 10px 0;">Suggestions de joueurs</h3>
                    <div class="list-scroller" id="suggestionsScroller"></div>
                </div>

                <!-- TAB 2: RECHERCHE AVANCÉE -->
                <div class="tab-view" id="rechercheTab">
                    <h3 style="color:var(--accent-gold); font-size:16px; margin:0 0 10px 0;">Rechercher un joueur</h3>
                    <div class="search-bar-row">
                        <input type="text" id="searchUserInput" placeholder="Entrez le prénom ou le @username...">
                        <button class="btn-action" onclick="searchNewPlayer()">Rechercher</button>
                    </div>
                    <div id="searchAlert"></div>
                    <div class="list-scroller" id="searchResultScroller"></div>
                </div>

                <!-- TAB 3: DEMANDES REÇUES & EN ATTENTE -->
                <div class="tab-view" id="demandeAmieTab">
                    <h3 style="color:var(--accent-gold); font-size:16px; margin:0 0 10px 0;">Demandes reçues</h3>
                    <div class="list-scroller" id="requestsScroller"></div>
                </div>

                <!-- TAB 4: LISTE DES BLOQUÉS -->
                <div class="tab-view" id="bloqueTab">
                    <h3 style="color:var(--accent-gold); font-size:16px; margin:0 0 10px 0;">Joueurs bloqués</h3>
                    <div class="list-scroller" id="blockedScroller"></div>
                </div>

            </div>

            <!-- BOITE DE CHAT PRIVÉ (DYNAMIC COVERSATION OVERLAY) -->
            <div class="chat-container" id="chatContainer">
                <div id="chatBoxContent" style="display:flex; flex-direction:column; height:100%;"></div>
            </div>

        </div>
    </div>

    <!-- SCRIPT FIREBASE LOGIC COMPLETE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getFirestore, doc, updateDoc, getDoc, collection, query, where, getDocs, addDoc, onSnapshot, orderBy, limit, writeBatch } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCF2I4LEcMA1oJRwa7xthvSOQGSCg6lPjs",
            authDomain: "aliquiz-509.firebaseapp.com",
            projectId: "aliquiz-509",
            storageBucket: "aliquiz-509.firebasestorage.app",
            messagingSenderId: "319472495068",
            appId: "1:319472495068:web:092e0b9efb14dae8f60719"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentQuizUser = JSON.parse(localStorage.getItem("currentQuizUser"));
        if (!currentQuizUser) { window.location.href = 'index.html'; }

        let activeChatFriendUID = null;
        let unsubChat = null;
        let unsubFriendStatus = null;

        // KONEKTE / EN LIGNE STATUS MANAGEMENT
        async function setUserOnlineStatus(isOnline) {
            if (!currentQuizUser || !currentQuizUser.uid) return;
            try {
                await updateDoc(doc(db, "users", currentQuizUser.uid), {
                    isOnline: isOnline,
                    lastSeen: new Date()
                });
            } catch(e) { console.error(e); }
        }

        setUserOnlineStatus(true);
        window.addEventListener('beforeunload', () => {
            setUserOnlineStatus(false);
        });

        function formatLastSeen(timestamp) {
            if(!timestamp) return "Hors ligne";
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const hrs = String(date.getHours()).padStart(2, '0');
            const mins = String(date.getMinutes()).padStart(2, '0');
            return `En ligne le ${date.toLocaleDateString('fr-FR')} à ${hrs}:${mins}`;
        }

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('hidden');
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('mainContent').classList.toggle('expanded');
        }

        window.switchSubTab = function(tabId, element) {
            document.querySelectorAll('.tab-view').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.menu-items li').forEach(li => li.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(element) element.classList.add('active');
            
            document.getElementById('chatContainer').classList.remove('view-chat');
            if(window.innerWidth <= 768) toggleSidebar();
        }

        window.backToFriendsList = function() {
            document.getElementById('chatContainer').classList.remove('view-chat');
            if(unsubChat) { unsubChat(); unsubChat = null; }
            if(unsubFriendStatus) { unsubFriendStatus(); unsubFriendStatus = null; }
            activeChatFriendUID = null;
        }

        function showAlert(targetId, msg, type='success') {
            const box = document.getElementById(targetId);
            if(!box) return;
            box.textContent = msg;
            box.className = `alert-msg ${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display='none', 4000);
        }

        // OBSÈVÈ METE JOU AN TAN REYÈL POU EVITE PWOBLEM KA PA MONTE YO
        function listenToMyUserData() {
            onSnapshot(doc(db, "users", currentQuizUser.uid), (snapshot) => {
                if (!snapshot.exists()) return;
                const userData = snapshot.data();

                const friends = userData.friends || [];
                const requests = userData.requests || [];
                const blocked = userData.blocked || [];
                const sentRequests = userData.sentRequests || []; 

                renderFriendsList(friends);
                renderRequestsList(requests);
                renderBlockedList(blocked);
                renderSentRequestsList(sentRequests); 
                loadSuggestions(friends, blocked, requests, sentRequests);
            });
        }

        // 1. LISTE AMIS
        async function renderFriendsList(friendsUIDs) {
            const container = document.getElementById('friendsScroller');
            container.innerHTML = '';
            if(friendsUIDs.length === 0) {
                container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucun ami pour le moment.</p>`;
                return;
            }
            
            friendsUIDs.forEach(uid => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.id = `friend-item-${uid}`;
                container.appendChild(div);

                onSnapshot(doc(db, "users", uid), (fDoc) => {
                    if(fDoc.exists()) {
                        const fData = fDoc.data();
                        const isOnline = fData.isOnline || false;
                        const flag = fData.country ? ` ${fData.country}` : ''; 
                        
                        div.onclick = () => openPrivateChat(fData);
                        div.innerHTML = `
                            <div class="user-info-mini">
                                <img class="user-avatar-mini" src="${fData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}">
                                <div>
                                    <h4 style="font-size:14px;">
                                        <span class="status-dot-indicator ${isOnline ? 'online' : ''}"></span>
                                        ${fData.prenom} ${flag}
                                    </h4>
                                    <p style="font-size:12px;color:var(--text-muted);">@${fData.username}</p>
                                </div>
                            </div>
                            <svg viewBox="0 0 24 24" style="width:20px; height:20px; fill:var(--accent-cyan);"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
                        `;
                    }
                });
            });
        }

        // 2. SUGGESTIONS
        async function loadSuggestions(myFriends, myBlocked, myRequests, mySentRequests) {
            const container = document.getElementById('suggestionsScroller');
            container.innerHTML = '';
            
            try {
                const q = query(collection(db, "users"), limit(15));
                const snap = await getDocs(q);
                let count = 0;

                snap.forEach(uDoc => {
                    const uData = uDoc.data();
                    if(uData.uid === currentQuizUser.uid || 
                       myFriends.includes(uData.uid) || 
                       myBlocked.includes(uData.uid) || 
                       myRequests.includes(uData.uid) || 
                       mySentRequests.includes(uData.uid)) return;

                    count++;
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    const flag = uData.country ? ` ${uData.country}` : '';
                    div.innerHTML = `
                        <div class="user-info-mini">
                            <img class="user-avatar-mini" src="${uData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}">
                            <div>
                                <h4 style="font-size:14px;">${uData.prenom}${flag}</h4>
                                <p style="font-size:12px;color:var(--text-muted);">@${uData.username}</p>
                            </div>
                        </div>
                        <button class="btn-action" style="padding:5px 10px; font-size:11px;" id="btnSug-${uData.uid}">Ajouter</button>
                    `;
                    container.appendChild(div);
                    document.getElementById(`btnSug-${uData.uid}`).onclick = (e) => {
                        e.stopPropagation();
                        sendFriendRequest(uData.uid, `btnSug-${uData.uid}`);
                    };
                });

                if(count === 0) {
                    container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucune suggestion disponible.</p>`;
                }
            } catch(e) {
                container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--error);">Erreur de chargement.</p>`;
            }
        }

        // 3. VOYE DEMANN ZANMI (FIKSÉ NET)
        window.sendFriendRequest = async function(targetUid, btnId = null) {
            try {
                const myRef = doc(db, "users", currentQuizUser.uid);
                const targetRef = doc(db, "users", targetUid);
                
                const mySnap = await getDoc(myRef);
                const targetSnap = await getDoc(targetRef);

                if(mySnap.exists() && targetSnap.exists()) {
                    let mySentRequests = mySnap.data().sentRequests || [];
                    let targetRequests = targetSnap.data().requests || [];

                    if(!targetRequests.includes(currentQuizUser.uid)) {
                        targetRequests.push(currentQuizUser.uid);
                        mySentRequests.push(targetUid);

                        const batch = writeBatch(db);
                        batch.update(targetRef, { requests: targetRequests });
                        batch.update(myRef, { sentRequests: mySentRequests });
                        await batch.commit();

                        if(btnId) {
                            const btn = document.getElementById(btnId);
                            if(btn) {
                                btn.textContent = "Envoyé";
                                btn.style.background = "var(--success)";
                                btn.disabled = true;
                            }
                        } else {
                            showAlert('searchAlert', 'Demande envoyée !', 'success');
                            searchNewPlayer(); 
                        }
                    } else {
                        if(!btnId) showAlert('searchAlert', 'Déjà envoyée.', 'error');
                    }
                }
            } catch(e) { 
                console.error(e);
                if(!btnId) showAlert('searchAlert', 'Erreur lors de l\'envoi.', 'error'); 
            }
        }

        // 4. RECHÈCH FLÈKSIB COCHON (.INCLUDES)
        window.searchNewPlayer = async function() {
            const input = document.getElementById('searchUserInput').value.trim().toLowerCase();
            if(input === '') return;
            
            const box = document.getElementById('searchResultScroller');
            box.innerHTML = '<p style="text-align:center; font-size:13px; color:var(--text-muted);">Recherche...</p>';

            try {
                const q = query(collection(db, "users"), limit(100));
                const snap = await getDocs(q);
                box.innerHTML = '';

                let foundCount = 0;
                
                const myDoc = await getDoc(doc(db, "users", currentQuizUser.uid));
                const myData = myDoc.data() || {};
                const myFriends = myData.friends || [];
                const mySentReqs = myData.sentRequests || [];

                snap.forEach(uDoc => {
                    const uData = uDoc.data();
                    if(uData.uid === currentQuizUser.uid) return;

                    const username = (uData.username || "").toLowerCase();
                    const prenom = (uData.prenom || "").toLowerCase();

                    if(username.includes(input) || prenom.includes(input)) {
                        foundCount++;
                        const div = document.createElement('div');
                        div.className = 'user-item';
                        const flag = uData.country ? ` ${uData.country}` : '';
                        
                        let actionBtn = `<button class="btn-action" style="padding:5px 10px; font-size:12px;" onclick="sendFriendRequest('${uData.uid}')">Ajouter</button>`;
                        
                        if(myFriends.includes(uData.uid)) {
                            actionBtn = `<span style="color:var(--success); font-size:12px; font-weight:bold;">Ami</span>`;
                        } else if(mySentReqs.includes(uData.uid)) {
                            actionBtn = `<span style="color:var(--text-muted); font-size:12px;">Déjà envoyé</span>`;
                        }

                        div.innerHTML = `
                            <div class="user-info-mini">
                                <img class="user-avatar-mini" src="${uData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}">
                                <div><h4>${uData.prenom}${flag} (@${uData.username})</h4></div>
                            </div>
                            ${actionBtn}
                        `;
                        box.appendChild(div);
                    }
                });

                if(foundCount === 0) {
                    showAlert('searchAlert', 'Aucun joueur trouvé.', 'error');
                    box.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucun résultat.</p>`;
                }

            } catch(e) {
                console.error(e);
                showAlert('searchAlert', 'Erreur de recherche.', 'error');
            }
        }

        // 5. DEMANDES REÇUES
        async function renderRequestsList(requestsUIDs) {
            const container = document.getElementById('requestsScroller');
            container.innerHTML = '';
            if(requestsUIDs.length === 0) {
                container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucune demande reçue.</p>`;
                return;
            }
            for(let uid of requestsUIDs) {
                const rDoc = await getDoc(doc(db, "users", uid));
                if(rDoc.exists()) {
                    const rData = rDoc.data();
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="user-info-mini">
                            <img class="user-avatar-mini" src="${rData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}">
                            <div><h4>@${rData.username}</h4></div>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-action" style="background:var(--success); padding:5px 12px; font-size:12px;" id="acc-${rData.uid}">Accepter</button>
                            <button class="btn-action" style="background:var(--error); padding:5px 12px; font-size:12px;" id="rej-${rData.uid}">Refuser</button>
                        </div>
                    `;
                    container.appendChild(div);
                    document.getElementById(`acc-${rData.uid}`).onclick = () => acceptFriend(rData.uid);
                    document.getElementById(`rej-${rData.uid}`).onclick = () => rejectFriend(rData.uid);
                }
            }
        }

        async function acceptFriend(senderUid) {
            const myRef = doc(db, "users", currentQuizUser.uid);
            const friendRef = doc(db, "users", senderUid);
            const mySnap = await getDoc(myRef);
            const fSnap = await getDoc(friendRef);

            if(mySnap.exists() && fSnap.exists()) {
                let myReqs = mySnap.data().requests || [];
                let myFriends = mySnap.data().friends || [];
                let fFriends = fSnap.data().friends || [];
                let fSentRequests = fSnap.data().sentRequests || [];

                myReqs = myReqs.filter(id => id !== senderUid);
                fSentRequests = fSentRequests.filter(id => id !== currentQuizUser.uid); 
                if(!myFriends.includes(senderUid)) myFriends.push(senderUid);
                if(!fFriends.includes(currentQuizUser.uid)) fFriends.push(currentQuizUser.uid);

                const batch = writeBatch(db);
                batch.update(myRef, { requests: myReqs, friends: myFriends });
                batch.update(friendRef, { friends: fFriends, sentRequests: fSentRequests });
                await batch.commit();
            }
        }

        async function rejectFriend(senderUid) {
            const myRef = doc(db, "users", currentQuizUser.uid);
            const friendRef = doc(db, "users", senderUid);
            const mySnap = await getDoc(myRef);
            const fSnap = await getDoc(friendRef);

            if(mySnap.exists()) {
                let myReqs = mySnap.data().requests || [];
                myReqs = myReqs.filter(id => id !== senderUid);
                
                const batch = writeBatch(db);
                batch.update(myRef, { requests: myReqs });

                if(fSnap.exists()) {
                    let fSentRequests = fSnap.data().sentRequests || [];
                    fSentRequests = fSentRequests.filter(id => id !== currentQuizUser.uid);
                    batch.update(friendRef, { sentRequests: fSentRequests });
                }
                await batch.commit();
            }
        }

        // 6. LIS MOUN MWEN VOYE DEMANN BA YO (EN ATTENTE)
        async function renderSentRequestsList(sentRequestsUIDs) {
            let container = document.getElementById('sentRequestsScroller');
            if(!container) {
                const demandeView = document.getElementById('demandeAmieTab');
                if(demandeView) {
                    const hr = document.createElement('hr');
                    hr.style.margin = "20px 0 10px 0";
                    hr.style.border = "0";
                    hr.style.borderTop = "1px solid rgba(255,255,255,0.08)";
                    
                    const title = document.createElement('h3');
                    title.textContent = "Demandes envoyées (En attente)";
                    title.style.fontSize = "15px";
                    title.style.color = "var(--accent-gold)";
                    
                    container = document.createElement('div');
                    container.className = "list-scroller";
                    container.id = "sentRequestsScroller";
                    
                    demandeView.appendChild(hr);
                    demandeView.appendChild(title);
                    demandeView.appendChild(container);
                }
            }
            
            if(!container) return;
            container.innerHTML = '';
            
            if(sentRequestsUIDs.length === 0) {
                container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucune demande en attente.</p>`;
                return;
            }

            for(let uid of sentRequestsUIDs) {
                const uDoc = await getDoc(doc(db, "users", uid));
                if(uDoc.exists()) {
                    const uData = uDoc.data();
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.style.cursor = 'default';
                    div.innerHTML = `
                        <div class="user-info-mini">
                            <img class="user-avatar-mini" src="${uData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}">
                            <div>
                                <h4 style="font-size:13px;">${uData.prenom}</h4>
                                <p style="font-size:11px;color:var(--text-muted);">@${uData.username}</p>
                            </div>
                        </div>
                        <span style="font-size:11px; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px; color:var(--text-muted);">En attente...</span>
                    `;
                    container.appendChild(div);
                }
            }
        }

        // 7. LISTE BLOCKED
        async function renderBlockedList(blockedUIDs) {
            const container = document.getElementById('blockedScroller');
            container.innerHTML = '';
            if(blockedUIDs.length === 0) {
                container.innerHTML = `<p style="text-align:center;font-size:13px;color:var(--text-muted);">Aucun joueur bloqué.</p>`;
                return;
            }
            for(let uid of blockedUIDs) {
                const bDoc = await getDoc(doc(db, "users", uid));
                if(bDoc.exists()) {
                    const bData = bDoc.data();
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <span>@${bData.username}</span>
                        <button class="btn-action" style="padding:4px 8px; font-size:11px; background:var(--success);" onclick="unblockUser('${bData.uid}')">Débloquer</button>
                    `;
                    container.appendChild(div);
                }
            }
        }

        window.blockUser = async function(targetUid) {
            const myRef = doc(db, "users", currentQuizUser.uid);
            const mySnap = await getDoc(myRef);
            if(mySnap.exists()) {
                let blocked = mySnap.data().blocked || [];
                let friends = mySnap.data().friends || [];
                friends = friends.filter(id => id !== targetUid);
                if(!blocked.includes(targetUid)) blocked.push(targetUid);

                await updateDoc(myRef, { blocked: blocked, friends: friends });
                backToFriendsList();
            }
        }

        window.unblockUser = async function(targetUid) {
            const myRef = doc(db, "users", currentQuizUser.uid);
            const mySnap = await getDoc(myRef);
            if(mySnap.exists()) {
                let blocked = mySnap.data().blocked || [];
                blocked = blocked.filter(id => id !== targetUid);
                await updateDoc(myRef, { blocked: blocked });
            }
        }

        // --- DINAMIK CONVERSATION & LIVE TICKS ---
        function openPrivateChat(friendData) {
            activeChatFriendUID = friendData.uid;
            if(unsubChat) unsubChat();
            if(unsubFriendStatus) unsubFriendStatus();

            document.getElementById('chatContainer').classList.add('view-chat');

            const chatId = currentQuizUser.uid < friendData.uid ? `${currentQuizUser.uid}_${friendData.uid}` : `${friendData.uid}_${currentQuizUser.uid}`;
            const flag = friendData.country ? ` ${friendData.country}` : '';

            const chatBox = document.getElementById('chatBoxContent');
            chatBox.innerHTML = `
                <div class="chat-header-info">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button class="btn-back" onclick="backToFriendsList()">
                            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            <span class="back-txt">Retour</span>
                        </button>
                        <img src="${friendData.profilePic || 'https://files.catbox.moe/dbcm8s.png'}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent-cyan); object-fit:cover;">
                        <div>
                            <h3 style="font-size:14px; color:var(--accent-gold); display:flex; align-items:center; gap:5px;">
                                ${friendData.prenom}${flag} 
                                <span id="headerOnlineTxt" style="font-size:11px; font-weight:bold;"></span>
                            </h3>
                            <p style="font-size:11px; color:var(--text-muted);">${friendData.coins || 0} AC | 🎮 ${friendData.totalGames || 0} P.</p>
                        </div>
                    </div>
                    <button class="btn-action" style="background:var(--error); padding:5px 10px; font-size:11px;" onclick="blockUser('${friendData.uid}')">Bloquer</button>
                </div>

                <div class="chat-messages" id="chatMessageFlow"></div>

                <div class="chat-input-row">
                    <input type="text" id="chatInputField" placeholder="Écrire un message...">
                    <button class="btn-action" id="sendMessageBtn">
                        <span>Envoyer</span>
                        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:black;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            `;

            let initialFriendOnlineStatus = false;
            unsubFriendStatus = onSnapshot(doc(db, "users", friendData.uid), (snapshot) => {
                if(snapshot.exists()) {
                    const data = snapshot.data();
                    const statusTxt = document.getElementById('headerOnlineTxt');
                    initialFriendOnlineStatus = data.isOnline || false;
                    if(statusTxt) {
                        if(initialFriendOnlineStatus) {
                            statusTxt.textContent = "(online)";
                            statusTxt.style.color = "var(--success)";
                        } else {
                            statusTxt.textContent = `(${formatLastSeen(data.lastSeen)})`;
                            statusTxt.style.color = "var(--text-muted)";
                        }
                    }
                }
            });

            const qMessages = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            
            unsubChat = onSnapshot(qMessages, async (snapshot) => {
                const flow = document.getElementById('chatMessageFlow');
                if(!flow) return;
                flow.innerHTML = '';
                
                let batch = null;
                
                snapshot.forEach((msgDoc) => {
                    const msg = msgDoc.data();
                    const msgId = msgDoc.id;
                    const isMe = msg.senderId === currentQuizUser.uid;

                    if (!isMe && msg.status !== "read") {
                        if (!batch) batch = writeBatch(db);
                        batch.update(doc(db, "chats", chatId, "messages", msgId), { status: "read" });
                    }

                    const containerDiv = document.createElement('div');
                    containerDiv.className = `msg-container ${isMe ? 'sent' : 'received'}`;

                    let tickMarkup = '';
                    if (isMe) {
                        if (msg.status === "read") {
                            tickMarkup = `
                                <span class="ticks">
                                    <svg class="tick-svg read" viewBox="0 0 24 24"><path d="M0.41 13.41L6 19l1.41-1.42L1.83 12m5.66 5.66l12-12L18.07 4.25 7.5 14.82M23.25 5.66l-12 12-1.42-1.41 12-12z"/></svg>
                                </span>`;
                        } else if (msg.status === "delivered") {
                            tickMarkup = `
                                <span class="ticks">
                                    <svg class="tick-svg delivered" viewBox="0 0 24 24"><path d="M0.41 13.41L6 19l1.41-1.42L1.83 12m5.66 5.66l12-12L18.07 4.25 7.5 14.82M23.25 5.66l-12 12-1.42-1.41 12-12z"/></svg>
                                </span>`;
                        } else {
                            tickMarkup = `
                                <span class="ticks">
                                    <svg class="tick-svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                                </span>`;
                        }
                    }

                    let timeStr = "";
                    if (msg.timestamp) {
                        const tDate = msg.timestamp.toDate ? msg.timestamp.toDate() : new Date(msg.timestamp);
                        timeStr = `${String(tDate.getHours()).padStart(2, '0')}:${String(tDate.getMinutes()).padStart(2, '0')}`;
                    }

                    containerDiv.innerHTML = `
                        <div class="msg">${msg.text}</div>
                        <div class="msg-meta">
                            <span>${timeStr}</span>
                            ${tickMarkup}
                        </div>
                    `;
                    flow.appendChild(containerDiv);
                });

                if (batch) { await batch.commit(); }
                flow.scrollTop = flow.scrollHeight;
            });

            setTimeout(() => {
                const inputFld = document.getElementById('chatInputField');
                if(inputFld) {
                    inputFld.focus();
                    inputFld.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') sendChatMessage(initialFriendOnlineStatus);
                    });
                }
                const sBtn = document.getElementById('sendMessageBtn');
                if(sBtn) {
                    sBtn.onclick = () => sendChatMessage(initialFriendOnlineStatus);
                }
            }, 200);
        }

        window.sendChatMessage = async function(isFriendOnline = false) {
            const input = document.getElementById('chatInputField');
            if(!input) return;
            const txt = input.value.trim();
            if(!activeChatFriendUID || txt === "") return;

            const initialStatus = isFriendOnline ? "delivered" : "sent";
            const chatId = currentQuizUser.uid < activeChatFriendUID ? `${currentQuizUser.uid}_${activeChatFriendUID}` : `${activeChatFriendUID}_${currentQuizUser.uid}`;
            
            await addDoc(collection(db, "chats", chatId, "messages"), {
                senderId: currentQuizUser.uid,
                text: txt,
                status: initialStatus,
                timestamp: new Date()
            });
            input.value = '';
            input.focus();
        }

        // LANSE KOUTE KONEKSYON AN TAN REYÈL
        listenToMyUserData();
    </script>
</body>
</html>
