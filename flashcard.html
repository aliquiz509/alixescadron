<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliquiz</title>
    <style>
        body { background: #0a0e1a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .wrapper { perspective: 1000px; width: 300px; height: 200px; margin: 50px auto; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .front { background: #1e293b; border: 2px solid #00d2ff; color: #00d2ff; }
        .back { background: #1e1b4b; border: 2px solid #ffeaa7; color: #ffeaa7; transform: rotateY(180deg); }
        .btn { padding: 10px 20px; background: #4a69bd; color: white; border: none; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <h2>🃏 Flashcards Interactifs</h2>
    <p>Klike sou kat la pou wè definisyon an</p>
    <div class="wrapper" onclick="document.getElementById('fc').classList.toggle('flipped')">
        <div class="card" id="fc">
            <div class="face front">Mitochondrie</div>
            <div class="face back">Centrale énergétique de la cellule</div>
        </div>
    </div>
    <br><br>
    <a href="dashboard.html" class="btn">⬅️ Retour au Dashboard</a>
</body>
</html>
