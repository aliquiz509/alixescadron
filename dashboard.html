<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliquiz - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --panel-bg: rgba(16, 24, 48, 0.85);
            --accent-gold: #ffeaa7;
            --accent-cyan: #00d2ff;
            --accent-blue: #4a69bd;
            --text-light: #ffffff;
            --text-muted: #a4b0be;
            --success: #2ed573;
            --error: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(rgba(10, 14, 26, 0.8), rgba(10, 14, 26, 0.95)), 
                        url('https://files.catbox.moe/5u3toy.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            padding: 20px;
        }

        .container {
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 40px 35px;
        }

        .container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(var(--accent-blue), #6a89cc, var(--accent-cyan), #3a1c71, var(--accent-gold), var(--accent-blue));
            top: -25%;
            left: -25%;
            animation: rotate 6s linear infinite;
            z-index: -2;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: var(--panel-bg);
            border-radius: 21px;
            z-index: -1;
            backdrop-filter: blur(10px);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .user-badge {
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-info-text h3 { color: var(--accent-gold); font-size: 18px; }
        
        .quiz-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill { height: 100%; width: 0%; background: var(--accent-cyan); transition: width 0.3s ease; }
        .question-text { font-size: 18px; font-weight: 500; margin-bottom: 20px; line-height: 1.5; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent-cyan); padding-left: 25px; }
        
        .score-circle {
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent-gold);
            display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px auto;
        }
        .score-num { font-size: 36px; font-weight: bold; color: var(--accent-gold); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), #6a89cc);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(74, 105, 189, 0.4);
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 105, 189, 0.6);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--error);
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
            margin-top: 15px;
            display: block;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="user-badge">
            <div class="user-info-text">
                <span style="color: var(--accent-cyan); font-size: 12px; font-weight: bold;">JOUEUR</span>
                <h3 id="dashUser">Chargement...</h3>
            </div>
            <div id="dashCountry" style="font-size: 24px;">🌐</div>
        </div>

        <div id="quizIntro">
            <h2 style="margin-bottom: 10px; color: var(--accent-gold);">Prêt pour le défi ?</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px; line-height: 1.6;">
                Testez vos connaissances en Biologie cellulaire, génétique et anatomie humaine. Répondez correctement aux questions.
            </p>
            <button class="btn-primary" onclick="startQuiz()">Lancer le Quiz 🚀</button>
            <button class="logout-btn" onclick="logout()">Se déconnecter 🚪</button>
        </div>

        <div id="quizPlay" style="display: none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div class="quiz-card">
                <p id="questionText" class="question-text">Chargement de la question...</p>
                <div id="optionsGrid" class="options-grid"></div>
            </div>
        </div>

        <div id="quizResult" style="display: none; text-align: center;">
            <h2 style="color: var(--accent-cyan);">Quiz Terminé !</h2>
            <div class="score-circle">
                <span class="score-num" id="finalScore">0</span>
                <span style="font-size: 12px; color: var(--text-muted);" id="maxScore">/5</span>
            </div>
            <p id="resultComment" style="margin-bottom: 20px; font-style: italic;"></p>
            <button class="btn-primary" onclick="restartQuiz()">Recommencer 🔄</button>
        </div>
    </div>

    <script>
        // Tcheke si moun nan gen dwa la
        const userData = JSON.parse(localStorage.getItem("currentQuizUser"));
        if (!userData) {
            window.location.href = 'index.html';
        }

        const countryFlags = {
            fr: "🇫🇷", ht: "🇭🇹", us: "🇺🇸", ca: "🇨🇦", be: "🇧🇪", 
            ch: "🇨🇭", de: "🇩🇪", es: "🇪🇸", it: "🇮🇹", uk: "🇬🇧", 
            br: "🇧🇷", jp: "🇯🇵", au: "🇦🇺"
        };

        // Afiche Enfòmasyon yo nan Badj la
        document.getElementById('dashUser').textContent = `${userData.prenom} ${userData.nom} (@${userData.username})`;
        document.getElementById('dashCountry').textContent = countryFlags[userData.country] || "🌐";

        const soundEffect = (type) => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            if(type === 'success') {
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.25);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.2);
            } else if(type === 'click') {
                osc.frequency.setValueAtTime(400, ctx.currentTime); gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start(); osc.stop(ctx.currentTime + 0.05);
            }
        };

        /* --- SIKYI KIZ (QUIZ SYSTEM) --- */
        const biologyQuestions = [
            { q: "Quelle est l'unité de base de tout être vivant ?", o: ["L'atome", "La cellule", "La molécule", "Le tissu"], a: 1 },
            { q: "Où se trouve la majorité de l'information génétique (ADN) dans une cellule eucaryote ?", o: ["Le cytoplasme", "Le noyau", "La membrane plasmique", "Le ribosome"], a: 1 },
            { q: "Quel processus permet aux plantes vertes de fabriquer leur propre matière organique grâce à la lumière ?", o: ["La respiration", "La photosynthèse", "La fermentation", "La mitose"], a: 1 },
            { q: "Combien de chromosomes possède une cellule humaine normale (hors cellules sexuelles) ?", o: ["23 chromosomes", "46 chromosomes", "48 chromosomes", "12 chromosomes"], a: 1 },
            { q: "Quel organite est considéré comme la 'centrale énergétique' de la cellule ?", o: ["L'appareil de Golgi", "Le réticulum endoplasmique", "La mitochondrie", "Le lysosome"], a: 2 }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        window.startQuiz = function() {
            soundEffect('click');
            document.getElementById('quizIntro').style.display = 'none';
            document.getElementById('quizResult').style.display = 'none';
            document.getElementById('quizPlay').style.display = 'block';
            currentQuestionIndex = 0; score = 0;
            showQuestion();
        };

        function showQuestion() {
            const qData = biologyQuestions[currentQuestionIndex];
            const progressPercent = (currentQuestionIndex / biologyQuestions.length) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            document.getElementById('questionText').textContent = qData.q;
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            qData.o.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(idx);
                optionsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selectedIdx) {
            const qData = biologyQuestions[currentQuestionIndex];
            if(selectedIdx === qData.a) { score++; soundEffect('success'); } else { soundEffect('error'); }
            currentQuestionIndex++;
            if(currentQuestionIndex < biologyQuestions.length) { showQuestion(); } else { showResults(); }
        }

        function showResults() {
            document.getElementById('quizPlay').style.display = 'none';
            document.getElementById('quizResult').style.display = 'block';
            document.getElementById('progressFill').style.width = `100%`;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxScore').textContent = `/${biologyQuestions.length}`;
            let comment = score === biologyQuestions.length ? "Excellent ! Vous êtes un vrai biologiste ! 🧠🧬" : score >= 3 ? "Très bien ! Bonnes connaissances. 👍" : "Ne découragez pas ! Réessayez pour vous améliorer. 🔬";
            document.getElementById('resultComment').textContent = comment;
        }

        window.restartQuiz = function() { window.startQuiz(); };

        window.logout = function() {
            soundEffect('click');
            localStorage.removeItem("currentQuizUser");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
