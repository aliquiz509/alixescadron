<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AliQuiz - Arena</title>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --panel-bg: rgba(16, 24, 48, 0.95);
            --accent-gold: #ffeaa7;
            --accent-cyan: #00d2ff;
            --text-light: #ffffff;
            --text-muted: #a4b0be;
            --success: #2ed573;
            --error: #ff4757;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(rgba(10, 14, 26, 0.85), rgba(10, 14, 26, 0.98)), url('https://files.catbox.moe/5u3toy.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; color: var(--text-light); display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container { width: 100%; max-width: 700px; background: var(--panel-bg); backdrop-filter: blur(15px); border: 1px solid var(--border-color); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        
        h1 { color: var(--accent-gold); margin-bottom: 20px; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        h2 { color: var(--accent-cyan); margin-bottom: 15px; font-size: 1.4rem; }
        p { color: var(--text-muted); margin-bottom: 20px; }

        /* Griy pou bouton yo */
        .grid-selection { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .grid-selection::-webkit-scrollbar { width: 6px; }
        .grid-selection::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .btn-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 15px; border-radius: 14px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: capitalize; font-size: 0.95rem; }
        .btn-box:hover { background: rgba(0, 210, 255, 0.08); border-color: var(--accent-cyan); transform: translateY(-2px); }

        .btn-level { background: rgba(255, 234, 167, 0.05); border: 1px solid rgba(255, 234, 167, 0.2); color: var(--accent-gold); font-size: 1.1rem; font-weight: bold; padding: 20px; border-radius: 12px; }
        .btn-level:hover { background: var(--accent-gold); color: var(--bg-dark); }

        /* UI Jwèt la */
        .quiz-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-size: 0.9rem; }
        .question-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; text-align: left; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .option-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); padding: 16px; border-radius: 12px; color: white; text-align: left; font-size: 1rem; cursor: pointer; transition: all 0.2s; width: 100%; }
        .option-btn:hover { background: rgba(255,255,255,0.08); }
        
        /* Koulè Repons yo */
        .correct { background: var(--success) !important; border-color: var(--success) !important; color: #0a0e1a !important; font-weight: bold; }
        .wrong { background: var(--error) !important; border-color: var(--error) !important; color: white !important; }

        .btn-action { background: linear-gradient(135deg, #4a69bd, #5758bb); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-buy { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #0a0e1a; margin-top: 10px; font-size: 0.85rem; padding: 8px 16px; }

        .btn-back { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; position: absolute; top: 20px; left: 20px; }
        .btn-back:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <button class="btn-back" id="btnBack" style="display: none;" onclick="goBack()">← Retour</button>

    <div class="container">
        <div id="viewSystem">
            <h1>Sélectionnez un Appareil</h1>
            <p>Choisissez le système anatomique pour démarrer le quiz</p>
            <div class="grid-selection" id="systemsGrid"></div>
        </div>

        <div id="viewLevel" style="display: none;">
            <h1 id="selectedSystemTitle">Appareil</h1>
            <h2>Choisissez un Niveau</h2>
            <p>Chaque niveau contient 15 questions. Score requis : 10/15.</p>
            <div class="grid-selection" id="levelsGrid"></div>
        </div>

        <div id="viewQuiz" style="display: none;">
            <div class="quiz-header">
                <div>Coins: <span id="playerCoinsText" style="color: var(--accent-gold);">0</span> AC</div>
                <div id="quizProgress">Question: 1/15</div>
                <div>Score: <span id="currentScoreText" style="color: var(--success);">0</span>/15</div>
            </div>
            <div class="question-text" id="questionField">Chargement de la question...</div>
            <div class="options-list" id="optionsBox"></div>
            
            <button class="btn-action btn-buy" id="btnBuyAnswer" onclick="buyCurrentAnswer()">Acheter la réponse (<span id="buyCostText">5</span> AC)</button>
        </div>

        <div id="viewResult" style="display: none;">
            <h1 id="resultTitle">Résultat</h1>
            <h2 id="resultScore" style="font-size: 2.5rem; margin: 20px 0;">0 / 15</h2>
            <p id="resultMessage">Message de fin</p>
            <button class="btn-action" onclick="showLevelsScreen()">Continuer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCF2I4LEcMA1oJRwa7xthvSOQGSCg6lPjs",
            authDomain: "aliquiz-509.firebaseapp.com",
            projectId: "aliquiz-509",
            storageBucket: "aliquiz-509.firebasestorage.app",
            messagingSenderId: "319472495068",
            appId: "1:319472495068:web:092e0b9efb14dae8f60719"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LIS APARÈY YO
        const apparatList = [
            "Appareil digestif", "Appareil circulatoire", "Appareil respiratoire", "Appareil locomoteur",
            "Appareil squelettique", "Appareil musculaire", "Appareil excréteur", "Appareil reproducteur",
            "Appareil tégumentaire", "Appareil urinaire", "Système génétique", "Système nerveux central",
            "Système nerveux périphérique", "Appareil sensoriel", "Système immunitaire", "Système endocrinien",
            "Système lymphatique", "Appareil auditif", "Appareil génito-urinaire", "Appareil phonatoire"
        ];

        // Son yo (Web Audio API pou evite telechaje gwo fichiye son)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'correct') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else {
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Eta Global Jwèt la
        let currentQuizUser = null;
        let userData = {};
        let selectedSystem = "";
        let selectedLevel = 1;
        let questionsList = [];
        let currentQuestionIndex = 0;
        let currentScore = 0;
        let purchasedCountThisLevel = 0;
        let hasAnswered = false;

        window.addEventListener('DOMContentLoaded', async () => {
            currentQuizUser = JSON.parse(localStorage.getItem("currentQuizUser"));
            if (!currentQuizUser) { window.location.href = 'index.html'; return; }
            
            // Rekipere done jwè a
            const userDoc = await getDoc(doc(db, "users", currentQuizUser.uid));
            if(userDoc.exists()) { userData = userDoc.data(); }

            buildSystemsGrid();
        });

        function buildSystemsGrid() {
            document.getElementById('btnBack').style.display = 'none';
            const grid = document.getElementById('systemsGrid');
            grid.innerHTML = "";
            apparatList.forEach(sys => {
                const btn = document.createElement('button');
                btn.className = 'btn-box';
                btn.innerText = sys;
                btn.onclick = () => selectSystem(sys);
                grid.appendChild(btn);
            });
        }

        function selectSystem(systemName) {
            selectedSystem = systemName;
            document.getElementById('viewSystem').style.display = 'none';
            document.getElementById('viewLevel').style.display = 'block';
            document.getElementById('btnBack').style.display = 'block';
            document.getElementById('selectedSystemTitle').innerText = systemName;

            // Bati griy 20 nivo yo
            const grid = document.getElementById('levelsGrid');
            grid.innerHTML = "";
            for (let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-box btn-level';
                btn.innerText = `Niveau ${i}`;
                btn.onclick = () => startQuizLevel(i);
                grid.appendChild(btn);
            }
        }

        async function startQuizLevel(levelNum) {
            selectedLevel = levelNum;
            document.getElementById('viewLevel').style.display = 'none';
            document.getElementById('viewQuiz').style.display = 'block';
            
            // Re-inisyalize eta nivo a
            currentQuestionIndex = 0;
            currentScore = 0;
            purchasedCountThisLevel = 0;
            updateBuyButtonUI();

            document.getElementById('playerCoinsText').innerText = userData.coins || 0;
            document.getElementById('currentScoreText').innerText = 0;

            // Chache kesyon yo nan Firestore pou Aparèy sa a ak Nivo sa a
            document.getElementById('questionField').innerText = "Chargement des questions...";
            document.getElementById('optionsBox').innerHTML = "";

            try {
                const qRef = collection(db, "questions");
                const q = query(qRef, where("system", "==", selectedSystem), where("level", "==", selectedLevel));
                const snap = await getDocs(q);

                questionsList = [];
                snap.forEach(doc => {
                    questionsList.push({ id: doc.id, ...doc.data() });
                });

                // Si baz de done a vid pou aparèy sa, nou kreye fo kesyon tès pou nivo a pa bloke jwè a
                if(questionsList.length === 0) {
                    for(let i=1; i<=15; i++) {
                        questionsList.push({
                            question: `[Exemple] Question ${i} sur l'${selectedSystem} (Niveau ${selectedLevel})`,
                            options: ["Option Correcte", "Option B", "Option C", "Option D"],
                            answer: "Option Correcte"
                        });
                    }
                }

                showQuestion();
            } catch (e) {
                console.error(e);
                document.getElementById('questionField').innerText = "Erreur de chargement des questions.";
            }
        }

        function showQuestion() {
            hasAnswered = false;
            document.getElementById('btnBuyAnswer').style.display = (purchasedCountThisLevel < 3) ? 'inline-block' : 'none';
            
            if(currentQuestionIndex >= 15) {
                endQuizLevel();
                return;
            }

            document.getElementById('quizProgress').innerText = `Question: ${currentQuestionIndex + 1}/15`;
            const currentQ = questionsList[currentQuestionIndex];

            document.getElementById('questionField').innerText = currentQ.question;
            const optionsBox = document.getElementById('optionsBox');
            optionsBox.innerHTML = "";

            // Melanje opsyon yo pou yo pa toujou nan menm pozisyon
            const shuffledOptions = [...currentQ.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkPlayerAnswer(btn, opt, currentQ.answer);
                optionsBox.appendChild(btn);
            });
        }

        function checkPlayerAnswer(selectedBtn, chosenOpt, correctOpt) {
            if(hasAnswered) return;
            hasAnswered = true;

            const allBtns = document.querySelectorAll('.option-btn');
            
            if(chosenOpt === correctOpt) {
                selectedBtn.classList.add('correct');
                currentScore++;
                document.getElementById('currentScoreText').innerText = currentScore;
                playSound('correct');
            } else {
                selectedBtn.classList.add('wrong');
                // Toujou montre repons kòrèk la an vèt
                allBtns.forEach(btn => {
                    if(btn.innerText === correctOpt) btn.classList.add('correct');
                });
                playSound('wrong');
            }

            // Pase nan pwochen kesyon apre 2 segond
            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, 2000);
        }

        // AKSYON POU ACHTE REPONS
        window.buyCurrentAnswer = async function() {
            if(hasAnswered) return;
            if(purchasedCountThisLevel >= 3) { alert("Vous avez atteint la limite d'achat pour ce niveau."); return; }

            // Detèmine pri a selon kantite li te achte deja
            let cost = 5;
            if(purchasedCountThisLevel === 1) cost = 10;
            if(purchasedCountThisLevel === 2) cost = 15;

            if((userData.coins || 0) < cost) {
                alert("AliCoins insuffisants!");
                return;
            }

            // Deduwi pyès yo nan Firebase
            userData.coins -= cost;
            document.getElementById('playerCoinsText').innerText = userData.coins;
            purchasedCountThisLevel++;
            updateBuyButtonUI();

            try {
                await updateDoc(doc(db, "users", currentQuizUser.uid), { coins: userData.coins });
            } catch(e) { console.error("Erreur mise à jour pièces:", e); }

            // Jwenn bouton ki gen repons kòrèk la epi deklanche l otomatikman
            const currentQ = questionsList[currentQuestionIndex];
            const allBtns = document.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => {
                if(btn.innerText === currentQ.answer) {
                    checkPlayerAnswer(btn, currentQ.answer, currentQ.answer);
                }
            });
        };

        function updateBuyButtonUI() {
            let nextCost = 5;
            if(purchasedCountThisLevel === 1) nextCost = 10;
            if(purchasedCountThisLevel === 2) nextCost = 15;
            document.getElementById('buyCostText').innerText = nextCost;
        }

        async function endQuizLevel() {
            document.getElementById('viewQuiz').style.display = 'none';
            document.getElementById('viewResult').style.display = 'block';

            document.getElementById('resultScore').innerText = `${currentScore} / 15`;
            const title = document.getElementById('resultTitle');
            const msg = document.getElementById('resultMessage');

            if(currentScore >= 10) {
                title.innerText = "Niveau Réussi ! 🎉";
                title.style.color = "var(--success)";
                
                // Bay 30 coins kòm rekonpans
                userData.coins = (userData.coins || 0) + 30;
                msg.innerHTML = "Félicitations! Vous passez au niveau supérieur et gagnez <strong style='color:var(--accent-gold);'>+30 AliCoins</strong>.";
                
                try {
                    await updateDoc(doc(db, "users", currentQuizUser.uid), { coins: userData.coins });
                } catch(e) { console.error(e); }
            } else {
                title.innerText = "Échec ! ❌";
                title.style.color = "var(--error)";
                msg.innerText = "Score insuffisant (Minimum 10 requis). Réessayez pour débloquer la suite.";
            }
        }

        window.showLevelsScreen = function() {
            document.getElementById('viewResult').style.display = 'none';
            document.getElementById('viewLevel').style.display = 'block';
            selectSystem(selectedSystem); // Refreshe griy nivo yo
        };

        window.goBack = function() {
            if(document.getElementById('viewLevel').style.display === 'block') {
                document.getElementById('viewLevel').style.display = 'none';
                document.getElementById('viewSystem').style.display = 'block';
                document.getElementById('btnBack').style.display = 'none';
            }
        };
    </script>
</body>
</html>
