<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliquiz - Arena</title>
    <style>
        body { background: #0a0e1a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: rgba(16, 24, 48, 0.9); padding: 30px; border-radius: 20px; max-width: 500px; margin: 40px auto; border: 1px solid #ffeaa7; }
        .btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #00d2ff; color: white; border-radius: 8px; margin-top: 10px; cursor: pointer; text-align: left; }
        .timer-box { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 15px 0; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: #ff4757; transition: width 1s linear; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between;">
            <span style="color: #00d2ff; font-weight: bold;">Question 1/3</span>
            <span id="timerText" style="color: #ff4757; font-weight: bold;">15s</span>
        </div>
        <div class="timer-box"><div id="timerBar" class="timer-bar"></div></div>
        
        <h3 id="questionText">Quelle structure trie et emballe les protéines ?</h3>
        <div id="options">
            <button class="btn" onclick="next()">A) Ribosome</button>
            <button class="btn" onclick="next()">B) Appareil de Golgi</button>
            <button class="btn" onclick="next()">C) Lysosome</button>
        </div>
    </div>
    <script>
        let count = 15;
        setInterval(() => {
            if(count > 0) {
                count--;
                document.getElementById('timerText').textContent = count + 's';
                document.getElementById('timerBar').style.width = (count/15)*100 + '%';
            } else { next(); }
        }, 1000);
        function next() { window.location.href = 'dashboard.html'; }
    </script>
</body>
</html>
